name: Build e publica imagem Docker

# Builda a partir do Dockerfile na raiz (Vite build -> nginx) e publica no
# GitHub Container Registry a cada push na main. Usa o GITHUB_TOKEN
# automático do próprio Actions (permissions: packages: write) — nenhuma
# credencial manual precisa existir em lugar nenhum pra isso funcionar.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Nenhum destes e segredo (URL do projeto Supabase, anon key
          # publica por design, URL publica da API) — por isso vao direto no
          # workflow em vez de precisar de Repository Secrets configurados a
          # mao. Ver revisao de seguranca pre-VPS (secao 1).
          build-args: |
            VITE_SUPABASE_URL=https://bkyztodycgvhagzcubes.supabase.co
            VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJreXp0b2R5Y2d2aGFnemN1YmVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDIwODQsImV4cCI6MjA5OTAxODA4NH0.i9b4FrNMjQqydOQfn-nciL3uBhStP6igygpYbjX5P0A
            VITE_API_BASE_URL=https://api.amorimcrm.online
